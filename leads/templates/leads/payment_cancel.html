<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Canceled</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff6f5; margin: 0; color: #b02a37; }
        .message { max-width: 640px; margin: 120px auto; padding: 34px; background: white; border-radius: 18px; box-shadow: 0 20px 50px rgba(16, 24, 40, .08); text-align: center; }
        h1 { margin-bottom: 14px; }
        p { color: #495057; line-height: 1.6; }
        a { color: #1f3b88; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="message">
        <h1>Payment Canceled</h1>
        <p>Your payment was canceled. You can try again anytime.</p>
        <p><a href="/{% url 'leads_list' %}/">Return to leads</a></p>
    </div>
</body>
</html>
