{% extends "admin/base_site.html" %}
{% block content %}
<div style="padding: 20px; background: var(--body-bg, #fff); border: 1px solid var(--border-color, #ccc); border-radius: 4px;">
    <h2>Import Chamber Leads CSV</h2>
    <p>Upload your <code>master_leads_list.csv</code> output file below to inject records directly into PostgreSQL.</p>
    
    <form action="." method="POST" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <input type="file" name="csv_file" accept=".csv" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div>
            <input type="submit" value="Upload and Parse Leads" class="default" style="background: #417690; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
            <a href="../" style="margin-left: 15px; text-decoration: none; color: #666;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
