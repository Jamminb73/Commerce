<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Premium | GA Commerce Leads</title>
    <style>
        :root {
            --primary-bg: #1a2a6c;
            --accent-color: #f39c12;
            --text-dark: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #2a3b8c 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .pricing-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .pricing-card h2 {
            color: var(--primary-bg);
            margin-top: 0;
        }

        .price {
            font-size: 3rem;
            font-weight: bold;
            color: var(--text-dark);
            margin: 20px 0;
        }

        .price span {
            font-size: 1rem;
            color: #718096;
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 30px 0;
            text-align: left;
        }

        .features li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .features li::before {
            content: "✓";
            color: #2ecc71;
            font-weight: bold;
            margin-right: 10px;
        }

        .btn-purchase {
            display: block;
            width: 100%;
            background: var(--accent-color);
            color: white;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-purchase:hover {
            background: #e67e22;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="pricing-card">
        <h2>Premium Access</h2>
        <p>Unlock the complete unmasked directory of professional leads.</p>
        
        <div class="price">$49<span>/per month, cancel anytime!</span></div>
        
        <ul class="features">
            <li>Full unmasked names & titles</li>
            <li>Verified email endpoints</li>
            <li>All Georgia Chamber variations</li>
            <li>CSV export capabilities</li>
        </ul>

        <form action="{% url 'create_checkout_session' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-purchase">Upgrade via Stripe</button>
        </form>

        <a href="{% url 'leads_list' %}" class="back-link">← Return to Leads Table</a>
    </div>

</body>
</html>
