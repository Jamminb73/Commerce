<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog Post | Chamber Pipeline</title>
    <style>
        :root {
            --primary-bg: #1a2a6c;
            --accent-color: #f39c12;
            --text-dark: #2d3748;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f7fafc; color: var(--text-dark); }
        
        .admin-header {
            background: var(--primary-bg);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { margin: 0; font-size: 1.5rem; }
        .back-btn { color: white; text-decoration: none; font-weight: 600; opacity: 0.8; }
        .back-btn:hover { opacity: 1; color: var(--accent-color); }
        
        .form-container { max-width: 700px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary-bg); }
        
        /* Styles the Django form fields dynamically */
        .form-input, .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-textarea { height: 300px; font-family: inherit; resize: vertical; }
        
        .btn-submit {
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>✍️ Write a New B2B Blog Post</h1>
        <a href="{% url 'blog:admin_dashboard' %}" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="form-container">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_title">Post Title</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label for="id_slug">URL Slug</label>
                {{ form.slug }}
            </div>

            <div class="form-group">
                <label for="id_body">Article Content</label>
                {{ form.body }}
            </div>

            <button type="submit" class="btn-submit">🚀 Publish Post to Database</button>
        </form>
    </div>

</body>
</html>
